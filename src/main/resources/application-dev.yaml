spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/asclepio_lab
    username: app_user
    password: app_password
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/asclepio_lab
    user: migration_user
    password: migration_password
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        show_sql: true
    hibernate:
      ddl-auto: validate
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "admin"
    password: "secret"
worker:
  datasource:
    username: worker_user
    password: worker_password
  outbox:
    enabled: true
    delay-ms: 5000
    max-attempts: 3
app:
  rabbitmq:
    exchange: "asclepio.events"
    queue: "patient.events.queue"
    binding-pattern: "patient.#"
    dead-letter-exchange: "asclepio.events.dlx"
    dead-letter-queue: "patient.events.dlq"
    dead-letter-routingKey: "patient.error"